<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>First Friday — Board Bored</title>
<meta property="og:title" content="First Friday Art Walk — live map">
<meta property="og:description" content="Downtown Bakersfield's open shops, galleries, and pop-ups — on one free map.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{--ink:#141116;--pap:#faf7f2;--card:#fff;--acc:#e4572e;--acc2:#17836c;--line:#e7e1d8;--mut:#7a736b;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--pap);color:var(--ink)}
  header{padding:14px 16px 10px;display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .mark{font-size:11px;letter-spacing:3px;font-weight:900;text-transform:uppercase;color:var(--acc);text-decoration:none}
  .badge{font-size:12px;font-weight:900;letter-spacing:.5px;padding:5px 11px;border-radius:999px;background:var(--acc);color:#fff;white-space:nowrap}
  .badge.future{background:var(--acc2)} .badge.past{background:var(--mut)}
  h1{font-size:clamp(22px,6.5vw,30px);letter-spacing:-.5px;padding:0 16px 2px}
  .sub{color:var(--mut);font-size:13.5px;padding:0 16px 12px}
  #map{height:46vh;min-height:300px;width:100%;z-index:1}
  .pinmoji{font-size:30px;line-height:1;filter:drop-shadow(0 3px 4px #0006);transform:translate(-2px,-6px)}
  .list{max-width:560px;margin:0 auto;padding:14px 14px 30px}
  .count{font-size:13px;font-weight:800;color:var(--acc2);text-transform:uppercase;letter-spacing:1px;margin:4px 2px 10px}
  .v{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:10px;cursor:pointer}
  .v:active{transform:scale(.99)}
  .v .top{display:flex;align-items:center;gap:10px}
  .v .emo{font-size:26px}
  .v .nm{font-weight:800;font-size:17px;letter-spacing:-.2px;flex:1}
  .v .cat{font-size:11px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.6px}
  .v .addr{font-size:13.5px;color:var(--mut);margin-top:6px}
  .v .hrs{font-size:13.5px;color:var(--ink);font-weight:700;margin-top:2px}
  .v .note{font-size:14px;color:#4a443e;margin-top:6px;line-height:1.45}
  .v .links{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .v .links a,.v .links button{font-size:13px;font-weight:800;color:var(--acc2);text-decoration:none;border:1.5px solid var(--line);
    border-radius:999px;padding:6px 12px;background:#fff;font:inherit;cursor:pointer}
  .v.open{border-style:dashed}
  .v .openflag{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.6px;color:var(--acc2)}
  .notice{max-width:560px;margin:0 auto;padding:0 14px 4px;font-size:13px;color:var(--mut)}
  .sechead{max-width:560px;margin:22px auto 0;padding:0 14px;font-size:13px;font-weight:800;color:var(--acc2);
    text-transform:uppercase;letter-spacing:1px}
  .v.highlighted{outline:2.5px solid var(--acc);outline-offset:2px}
  .cta{display:block;text-align:center;background:var(--ink);color:#fff;text-decoration:none;font-weight:800;
    font-size:16px;border-radius:14px;padding:16px;margin:16px 0 8px}
  .rowbtn{display:flex;gap:10px}
  .rowbtn button,.rowbtn a{flex:1;appearance:none;text-align:center;text-decoration:none;border:1.5px solid var(--ink);
    background:transparent;color:var(--ink);font:inherit;font-weight:800;font-size:14.5px;border-radius:12px;padding:13px;cursor:pointer}
  footer{text-align:center;font-size:12px;color:var(--mut);padding:6px 16px 34px;line-height:1.7}
  footer a{color:var(--acc2);font-weight:700;text-decoration:none}
  .toast{position:fixed;left:50%;bottom:20px;translate:-50% 0;background:var(--ink);color:#fff;padding:11px 18px;
    border-radius:999px;font-size:14px;font-weight:700;opacity:0;transition:.25s;pointer-events:none;z-index:99}
  .toast.on{opacity:1;translate:-50% -8px}
</style>
</head>
<body>
<header>
  <a class="mark" href="../">● Board Bored</a>
  <span class="badge" id="badge">…</span>
</header>
<h1 id="evName">First Friday Art Walk</h1>
<div class="sub" id="evSub">Downtown Bakersfield</div>
<div class="notice" id="logisticsNote" style="display:none"></div>

<div id="map"></div>

<div class="list">
  <div class="count" id="count">Loading the walk…</div>
  <div id="vendors"></div>

  <div class="sechead" id="spotsHead" style="display:none">Sidewalk vendor spots</div>
  <div class="count" id="spotsCount" style="display:none"></div>
  <div id="spotCards"></div>

  <a class="cta" id="vendorCta" href="../vendor-signup.html">🏪 Get a spot on the map</a>
  <div class="rowbtn">
    <button id="share">📣 Share this map</button>
    <a href="../print.html">🖨️ Paper map</a>
  </div>
</div>

<footer>
  © 2026 Board Bored · made in Bakersfield<br>
  <a id="mailFoot" href="#">boardquestionmark@gmail.com</a>
</footer>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
  var $=function(id){return document.getElementById(id)};
  function toast(m){var t=$("toast");t.textContent=m;t.classList.add("on");
    clearTimeout(t._);t._=setTimeout(function(){t.classList.remove("on")},2000);}
  var map, markers={};
  var highlightId=new URLSearchParams(location.search).get("highlight");

  function shareLink(id,name,extra){
    var url=location.origin+location.pathname+"?highlight="+encodeURIComponent(id);
    var txt="Find "+name+" at First Friday"+(extra?" — "+extra:"")+".";
    var btn=document.createElement("button");btn.type="button";btn.textContent="🔗 Share this spot";
    btn.addEventListener("click",function(ev2){
      ev2.stopPropagation();
      if(navigator.share){navigator.share({title:name+" — First Friday",text:txt,url:url}).catch(function(){});}
      else if(navigator.clipboard){navigator.clipboard.writeText(txt+" "+url).then(function(){toast("Link copied — paste it anywhere")});}
      else{toast(url);}
    });
    return btn;
  }

  fetch("../data/board.json").then(function(r){return r.json()}).then(function(d){
    var email=(d.board&&d.board.contact)||"boardquestionmark@gmail.com";
    var slug=location.pathname.replace(/\/+$/,"").split("/").pop();
    var ev=(d.events||[]).filter(function(e){return e.slug===slug})[0]
         ||(d.events||[]).filter(function(e){return e.slug===d.featured})[0]
         ||(d.events||[])[0];
    if(!ev){$("count").textContent="No event data yet.";return;}

    document.title=ev.name+" — Board Bored";
    $("evName").textContent=ev.name;
    $("evSub").textContent=(ev.area||"")+(ev.blurb?" · "+ev.blurb:"");
    if(ev.logistics_note){$("logisticsNote").textContent="🚸 "+ev.logistics_note;$("logisticsNote").style.display="block";}

    // date-aware badge
    var today=new Date(); today.setHours(0,0,0,0);
    var p=(ev.date||"").split("-");
    var evd=p.length===3?new Date(+p[0],+p[1]-1,+p[2]):null;
    var b=$("badge");
    if(evd&&evd.getTime()===today.getTime()){b.textContent="🔥 TONIGHT · "+(ev.hours||"");}
    else if(evd&&evd>today){b.classList.add("future");
      b.textContent=evd.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})+" · "+(ev.hours||"");}
    else{b.classList.add("past");b.textContent="Next one soon";}

    var vendors=ev.vendors||[];
    var spots=ev.spots||[];

    // map — storefront vendors + sidewalk spots together
    var vs=vendors.filter(function(v){return typeof v.lat==="number"&&typeof v.lng==="number"});
    var ss=spots.filter(function(s){return typeof s.lat==="number"&&typeof s.lng==="number"});
    var allPts=vs.concat(ss);
    var c=allPts[0]||{lat:35.3757,lng:-119.0205};
    map=L.map("map",{scrollWheelZoom:false}).setView([c.lat,c.lng],16);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {maxZoom:19,attribution:"© OpenStreetMap contributors"}).addTo(map);
    if(allPts.length>1){map.fitBounds(allPts.map(function(v){return [v.lat,v.lng]}),{padding:[30,30]});}

    vs.forEach(function(v){
      var icon=L.divIcon({html:'<div class="pinmoji">'+(v.emoji||"📍")+'</div>',className:"",iconSize:[34,34],iconAnchor:[17,28]});
      markers["v:"+v.id]=L.marker([v.lat,v.lng],{icon:icon}).addTo(map)
        .bindPopup("<b>"+(v.emoji||"")+" "+v.name+"</b><br>"+(v.hours||"")+"<br>"+(v.address||""));
    });
    ss.forEach(function(s){
      var open=s.status!=="confirmed"||!s.vendor;
      var emo=open?"🟢":(s.vendor.emoji||"📍");
      var icon=L.divIcon({html:'<div class="pinmoji">'+emo+'</div>',className:"",iconSize:[34,34],iconAnchor:[17,28]});
      var pop=open?"<b>🟢 "+s.label+"</b><br>Open — first come, first served"
                  :"<b>"+emo+" "+(s.vendor.name||s.label)+"</b><br>"+s.label+(s.vendor.category?" · "+s.vendor.category:"");
      markers["s:"+s.id]=L.marker([s.lat,s.lng],{icon:icon}).addTo(map).bindPopup(pop);
    });

    // storefront vendor cards
    $("count").textContent=vendors.length+" stops on the walk";
    var box=$("vendors");
    vendors.forEach(function(v){
      var el=document.createElement("div");el.className="v";el.id="card-v-"+v.id;
      var links="";
      if(v.instagram){var ig=v.instagram.indexOf("http")===0?v.instagram:"https://instagram.com/"+v.instagram.replace("@","");
        links+='<a href="'+ig+'" target="_blank" rel="noopener">Instagram</a>';}
      if(v.website){var w=v.website.indexOf("http")===0?v.website:"https://"+v.website;
        links+='<a href="'+w+'" target="_blank" rel="noopener">Website</a>';}
      if(v.address&&v.address.indexOf("verify")===-1){
        links+='<a href="https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(v.address)+'" target="_blank" rel="noopener">Directions</a>';}
      el.innerHTML='<div class="top"><span class="emo">'+(v.emoji||"📍")+'</span>'+
        '<span class="nm">'+v.name+'</span><span class="cat">'+(v.category||"")+'</span></div>'+
        (v.address?'<div class="addr">'+v.address+'</div>':"")+
        (v.hours?'<div class="hrs">'+v.hours+'</div>':"")+
        (v.note?'<div class="note">'+v.note+'</div>':"");
      var linksEl=document.createElement("div");linksEl.className="links";linksEl.innerHTML=links;
      linksEl.appendChild(shareLink(v.id,v.name,v.category));
      el.appendChild(linksEl);
      el.addEventListener("click",function(e){
        if(e.target.closest("a,button"))return;
        panTo("v:"+v.id);
      });
      box.appendChild(el);
      if(highlightId===v.id)el.classList.add("highlighted");
    });

    // sidewalk spot cards
    if(spots.length){
      $("spotsHead").style.display="block";
      var openCt=spots.filter(function(s){return s.status!=="confirmed"||!s.vendor}).length;
      $("spotsCount").style.display="block";
      $("spotsCount").textContent=spots.length+" spots · "+openCt+" open · "+(spots.length-openCt)+" confirmed";
      var sbox=$("spotCards");
      spots.forEach(function(s){
        var open=s.status!=="confirmed"||!s.vendor;
        var el=document.createElement("div");el.className="v"+(open?" open":"");el.id="card-s-"+s.id;
        if(open){
          el.innerHTML='<div class="top"><span class="emo">🟢</span>'+
            '<span class="nm">'+s.label+'</span><span class="openflag">Open</span></div>'+
            '<div class="note">First come, first served — sidewalk only, streets stay open. <a href="../vendor-signup.html">Claim this spot →</a></div>';
        } else {
          var v=s.vendor;
          var links="";
          if(v.instagram){var ig=v.instagram.indexOf("http")===0?v.instagram:"https://instagram.com/"+v.instagram.replace("@","");
            links+='<a href="'+ig+'" target="_blank" rel="noopener">Instagram</a>';}
          if(v.website){var w=v.website.indexOf("http")===0?v.website:"https://"+v.website;
            links+='<a href="'+w+'" target="_blank" rel="noopener">Website</a>';}
          el.innerHTML='<div class="top"><span class="emo">'+(v.emoji||"📍")+'</span>'+
            '<span class="nm">'+v.name+'</span><span class="cat">'+(v.category||"")+'</span></div>'+
            '<div class="addr">'+s.label+'</div>'+
            (v.note?'<div class="note">'+v.note+'</div>':"");
          var linksEl=document.createElement("div");linksEl.className="links";linksEl.innerHTML=links;
          linksEl.appendChild(shareLink(s.id,v.name,s.label));
          el.appendChild(linksEl);
        }
        el.addEventListener("click",function(e){
          if(e.target.closest("a,button"))return;
          panTo("s:"+s.id);
        });
        sbox.appendChild(el);
        if(highlightId===s.id)el.classList.add("highlighted");
      });
    }

    function panTo(key){
      if(!markers[key])return;
      map.setView(markers[key].getLatLng(),17);markers[key].openPopup();
      window.scrollTo({top:0,behavior:"smooth"});
    }
    if(highlightId){
      var key=markers["v:"+highlightId]?"v:"+highlightId:(markers["s:"+highlightId]?"s:"+highlightId:null);
      if(key){setTimeout(function(){panTo(key);},300);}
    }

    $("mailFoot").href="mailto:"+email; $("mailFoot").textContent=email;
  }).catch(function(e){$("count").textContent="Couldn't load the map data.";});

  $("share").addEventListener("click",function(){
    var url=location.href.split("#")[0].split("?")[0];
    var txt="First Friday in Downtown Bakersfield — free live map of the open shops + galleries.";
    if(navigator.share){navigator.share({title:"First Friday — Board Bored",text:txt,url:url}).catch(function(){});}
    else if(navigator.clipboard){navigator.clipboard.writeText(txt+" "+url).then(function(){toast("Link copied — paste it anywhere")});}
    else{toast(url);}
  });
})();
</script>
</body>
</html>
